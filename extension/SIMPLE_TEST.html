<!DOCTYPE html>
<html>
<head>
  <title>Shrimpin' Simple Test</title>
  <style>
    body {
      font-family: system-ui;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    button {
      background: #E8734A;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #F09070; }
    #status {
      margin-top: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    video {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>🦐 Shrimpin' Test</h1>
  <p>This tests if MediaPipe works in your browser:</p>

  <button onclick="startTest()">START TEST</button>

  <div id="status">Click START TEST to begin...</div>

  <video id="video" autoplay playsinline style="display:none"></video>

  <script type="module">
    import { PoseLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

    window.startTest = async function() {
      const status = document.getElementById('status');
      const video = document.getElementById('video');

      try {
        status.innerHTML = '📹 Requesting camera access...';

        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.style.display = 'block';

        status.innerHTML = '✅ Camera working!<br>📦 Loading MediaPipe...';

        const vision = await FilesetResolver.forVisionTasks(
          'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
        );

        status.innerHTML += '<br>📦 Creating pose detector...';

        const poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task',
            delegate: 'GPU'
          },
          runningMode: 'VIDEO',
          numPoses: 1
        });

        status.innerHTML += '<br>✅ MediaPipe loaded!<br>🎯 Detecting pose...';

        // Test detection
        await video.play();
        const results = poseLandmarker.detectForVideo(video, performance.now());

        if (results.landmarks && results.landmarks.length > 0) {
          status.innerHTML += '<br><br>🎉 <strong>SUCCESS! Pose detected!</strong><br>Found ' + results.landmarks[0].length + ' landmarks.';
        } else {
          status.innerHTML += '<br>⚠️ No pose detected yet. Move into frame.';
        }

      } catch (error) {
        status.innerHTML = '❌ ERROR: ' + error.message + '<br><br>This means the extension cannot work. Possible issues:<br>• Camera blocked<br>• Browser doesn\'t support MediaPipe<br>• Network issue loading libraries';
        console.error(error);
      }
    };
  </script>
</body>
</html>
